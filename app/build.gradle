plugins {
    id 'com.android.application'
}

android {
    namespace 'com.yahya.vip' // Burayı kendi paket adınla değiştirebilirsin
    compileSdk 34

    defaultConfig {
        applicationId "com.yahya.vip"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    // Eğer özel kütüphanelerin varsa buraya eklenmeli
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.android.volley:volley:1.2.1'
}
